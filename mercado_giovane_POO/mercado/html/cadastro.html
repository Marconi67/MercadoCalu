<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Supermercado Giovane</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="card">
    <img src="../imagens/Design sem nome.png" alt="Logo" class="logo">
    <h2>Crie sua Conta</h2>

    <div class="mensagem-erro" id="msg-erro"></div>
    <div class="mensagem-sucesso" id="msg-sucesso"></div>

    <div class="campo">
      <label>Nome de usuário</label>
      <input type="text" id="campo-nome" placeholder="Ex: joaosilva">
    </div>
    <div class="campo">
      <label>Email</label>
      <input type="email" id="campo-email" placeholder="seu@email.com">
    </div>
    <div class="campo">
      <label>Senha</label>
      <input type="password" id="campo-senha" placeholder="Mínimo 4 caracteres">
    </div>

    <button class="btn-primario" onclick="fazerCadastro()">Criar conta</button>

    <span class="link-alternativo">
      Já tem conta? <a href="login.html">Entrar</a>
    </span>
    <span class="link-alternativo" style="margin-top:8px">
      <a href="panfleto.html">← Voltar à loja</a>
    </span>
  </div>

  <script src="../JS/app.js"></script>
  <script>
    function fazerCadastro() {
      const nome  = document.getElementById('campo-nome').value.trim();
      const email = document.getElementById('campo-email').value.trim();
      const senha = document.getElementById('campo-senha').value.trim();
      const msgErro    = document.getElementById('msg-erro');
      const msgSucesso = document.getElementById('msg-sucesso');

      msgErro.style.display = 'none';
      msgSucesso.style.display = 'none';

      try {
        gerenciadorUsuarios.cadastrar(nome, email, senha);
        msgSucesso.textContent = 'Conta criada com sucesso! Redirecionando para o login...';
        msgSucesso.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (e) {
        msgErro.textContent = e.message;
        msgErro.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerCadastro();
    });
  </script>
</body>
</html>
